<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">Customer Support Human Responsibility Boundary Map</title>
  <desc id="desc">A visual summary of the synthetic customer-support Human Responsibility Map, showing current workflow, target boundary states, control modes, release gate, and contradiction signals.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .title { font: 700 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e293b; }
      .small { font: 500 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 600 10px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .state-title { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .state-subtitle { font: 500 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .human { fill: #f1f5f9; stroke: #64748b; }
      .assist { fill: #eff6ff; stroke: #2563eb; }
      .executed { fill: #ecfdf5; stroke: #059669; }
      .blocked { fill: #fff7ed; stroke: #ea580c; }
      .gate { fill: #fef2f2; stroke: #dc2626; }
      .badge-human { fill: #e2e8f0; }
      .badge-assist { fill: #dbeafe; }
      .badge-executed { fill: #d1fae5; }
      .badge-control { fill: #fef3c7; stroke: #d97706; }
      .line { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow-dashed); }
      .divider { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1040"/>

  <text class="title" x="48" y="54">Customer Support Human Responsibility Boundary Map</text>
  <text class="subtitle" x="48" y="82">Synthetic example. Exact thresholds, evidence, and release decisions must be replaced with team-specific data.</text>

  <g id="legend" transform="translate(1040,35)">
    <rect class="panel" x="0" y="0" width="310" height="78" rx="8"/>
    <text class="tiny" x="18" y="23">Boundary states</text>
    <rect class="badge-human" x="18" y="35" width="72" height="24" rx="12"/>
    <text class="tiny" x="30" y="51">Human</text>
    <rect class="badge-assist" x="103" y="35" width="80" height="24" rx="12"/>
    <text class="tiny" x="115" y="51">Assisted</text>
    <rect class="badge-executed" x="196" y="35" width="92" height="24" rx="12"/>
    <text class="tiny" x="209" y="51">Executed</text>
  </g>

  <g id="current-flow" transform="translate(48,124)">
    <rect class="panel" x="0" y="0" width="1304" height="112" rx="10"/>
    <text class="section" x="22" y="30">Current work architecture</text>
    <text class="small" x="22" y="54">Mostly human-owned, repeated context gathering, QA after the interaction, and context loss on escalation.</text>

    <g transform="translate(22,70)">
      <rect class="human" x="0" y="0" width="106" height="28" rx="14"/>
      <text class="tiny" x="31" y="18">Intake</text>
      <path class="line" d="M112 14 H145"/>
      <rect class="human" x="151" y="0" width="106" height="28" rx="14"/>
      <text class="tiny" x="188" y="18">Triage</text>
      <path class="line" d="M263 14 H296"/>
      <rect class="human" x="302" y="0" width="122" height="28" rx="14"/>
      <text class="tiny" x="329" y="18">Context</text>
      <path class="line" d="M430 14 H463"/>
      <rect class="human" x="469" y="0" width="118" height="28" rx="14"/>
      <text class="tiny" x="496" y="18">Response</text>
      <path class="line" d="M593 14 H626"/>
      <rect class="human" x="632" y="0" width="128" height="28" rx="14"/>
      <text class="tiny" x="661" y="18">Investigation</text>
      <path class="line" d="M766 14 H799"/>
      <rect class="human" x="805" y="0" width="118" height="28" rx="14"/>
      <text class="tiny" x="833" y="18">Resolution</text>
      <path class="line" d="M929 14 H962"/>
      <rect class="human" x="968" y="0" width="118" height="28" rx="14"/>
      <text class="tiny" x="998" y="18">Escalate</text>
      <path class="line" d="M1092 14 H1125"/>
      <rect class="human" x="1131" y="0" width="118" height="28" rx="14"/>
      <text class="tiny" x="1165" y="18">QA/Close</text>
    </g>
  </g>

  <g id="boundary-map" transform="translate(48,266)">
    <text class="section" x="0" y="0">Target responsibility boundaries</text>
    <text class="subtitle" x="0" y="24">Dashed arrows show boundary movement from current human ownership toward AI-assisted or AI-executed responsibility.</text>

    <g transform="translate(0,48)">
      <rect class="panel" x="0" y="0" width="410" height="544" rx="10"/>
      <text class="state-title" x="22" y="30" fill="#334155">Human-owned or human-gated</text>
      <text class="state-subtitle" x="22" y="50" fill="#64748b">Decision, accountability, policy exception, empathy, residual risk</text>

      <rect class="human" x="22" y="78" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="100">Accept policy exception / residual risk</text>
      <text class="small" x="40" y="120">Not movable under this map</text>

      <rect class="human" x="22" y="150" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="172">Final risk and taxonomy policy</text>
      <text class="small" x="40" y="192">Support lead / product owner</text>

      <rect class="human" x="22" y="222" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="244">Customer-facing send decision</text>
      <text class="small" x="40" y="264">Human keeps high-risk and reviewed sends</text>

      <rect class="human" x="22" y="294" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="316">Investigation judgment</text>
      <text class="small" x="40" y="336">Agent approves or edits suggested plan</text>

      <rect class="human" x="22" y="366" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="388">Close and knowledge publication</text>
      <text class="small" x="40" y="408">Human approves close and KB updates</text>

      <rect class="gate" x="22" y="456" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="480">Release gate blocks</text>
      <text class="small" x="40" y="500">No auto-send/action for sensitive, emotional,</text>
      <text class="small" x="40" y="516">high-value, regulated, or low-confidence cases</text>
    </g>

    <g transform="translate(447,48)">
      <rect class="panel" x="0" y="0" width="410" height="544" rx="10"/>
      <text class="state-title" x="22" y="30" fill="#1d4ed8">AI-assisted</text>
      <text class="state-subtitle" x="22" y="50" fill="#2563eb">AI drafts, suggests, links sources; humans decide</text>

      <rect class="assist" x="22" y="78" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="100">Classify risk tier</text>
      <text class="small" x="40" y="120">Flag high-value, sensitive, emotional cases</text>

      <rect class="assist" x="22" y="150" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="172">Gather context</text>
      <text class="small" x="40" y="192">Source-linked ticket, account, incident, docs pack</text>

      <rect class="assist" x="22" y="222" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="244">Draft initial response</text>
      <text class="small" x="40" y="264">Policy-checked draft with uncertainty notes</text>

      <rect class="assist" x="22" y="294" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="316">Investigate likely cause</text>
      <text class="small" x="40" y="336">Suggested plan; human approves before action</text>

      <rect class="assist" x="22" y="366" width="352" height="54" rx="8"/>
      <text class="label" x="40" y="388">Close ticket and update case record</text>
      <text class="small" x="40" y="408">AI drafts summary; human approves close</text>

      <rect class="blocked" x="22" y="456" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="480">Movement conditions</text>
      <text class="small" x="40" y="500">Source fidelity, policy-compliance evals,</text>
      <text class="small" x="40" y="516">edit telemetry, stakeholder coverage</text>
    </g>

    <g transform="translate(894,48)">
      <rect class="panel" x="0" y="0" width="410" height="544" rx="10"/>
      <text class="state-title" x="22" y="30" fill="#047857">AI-executed</text>
      <text class="state-subtitle" x="22" y="50" fill="#059669">AI takes bounded action under explicit controls</text>

      <rect class="executed" x="22" y="78" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="100">Classify ticket intent and product area</text>
      <rect class="badge-control" x="40" y="112" width="122" height="20" rx="10"/>
      <text class="tiny" x="51" y="126">policy-governed</text>

      <rect class="executed" x="22" y="158" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="180">Send low-risk acknowledgement</text>
      <rect class="badge-control" x="40" y="192" width="116" height="20" rx="10"/>
      <text class="tiny" x="51" y="206">sampling-review</text>

      <rect class="executed" x="22" y="238" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="260">Execute bounded reversible fix</text>
      <rect class="badge-control" x="40" y="272" width="142" height="20" rx="10"/>
      <text class="tiny" x="51" y="286">approve-before-action</text>

      <rect class="executed" x="22" y="318" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="340">Escalate to product or engineering</text>
      <rect class="badge-control" x="40" y="352" width="122" height="20" rx="10"/>
      <text class="tiny" x="51" y="366">policy-governed</text>

      <rect class="gate" x="22" y="456" width="352" height="62" rx="8"/>
      <text class="label" x="40" y="480">Required controls</text>
      <text class="small" x="40" y="500">Audit log, rollback path, exception queue,</text>
      <text class="small" x="40" y="516">drift monitoring, accountable owner</text>
    </g>

    <path class="dashed" d="M260 124 C360 102 410 98 468 104"/>
    <path class="dashed" d="M260 196 C354 192 410 184 468 178"/>
    <path class="dashed" d="M260 268 C354 260 410 252 468 250"/>
    <path class="dashed" d="M260 340 C354 338 410 330 468 322"/>
    <path class="dashed" d="M260 412 C354 412 410 402 468 394"/>
    <path class="dashed" d="M706 104 C802 92 860 92 916 108"/>
    <path class="dashed" d="M706 178 C802 164 860 160 916 188"/>
    <path class="dashed" d="M706 322 C802 304 860 276 916 268"/>
    <path class="dashed" d="M706 394 C804 390 860 358 916 348"/>
  </g>

  <g id="bottom" transform="translate(48,894)">
    <rect class="panel" x="0" y="0" width="628" height="102" rx="10"/>
    <text class="section" x="22" y="30">Open assumptions and contradiction signals</text>
    <text class="small" x="22" y="54">If reopens, sampled QA failures, "feels robotic" feedback, sensitive-case leakage,</text>
    <text class="small" x="22" y="73">or rollback failures rise, move affected responsibilities back toward AI-assisted or Human-owned.</text>
    <text class="tiny" x="22" y="92">Durable ambiguity rule: prefer boundary moves that preserve optionality.</text>

    <rect class="panel" x="676" y="0" width="628" height="102" rx="10"/>
    <text class="section" x="698" y="30">Evidence status</text>
    <text class="small" x="698" y="54">All rows remain ai_generated_hypothesis until replaced by observed, interview_derived,</text>
    <text class="small" x="698" y="73">telemetry_derived, or artifact_derived evidence from the actual team.</text>
    <text class="tiny" x="698" y="92">Stakeholder coverage in this synthetic map is intentionally unsampled.</text>
  </g>
</svg>
